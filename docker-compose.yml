# Local PostgreSQL for DiteUp (see DATABASE_URL in backend/.env.example).
services:
  db:
    image: postgres:16-alpine
    container_name: diteup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diteup
      POSTGRES_PASSWORD: diteup_local_dev_only
      POSTGRES_DB: diteup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diteup -d diteup"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - diteup_pgdata:/var/lib/postgresql/data

volumes:
  diteup_pgdata:
